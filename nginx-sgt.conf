server {
    listen 80;
    server_name sgt.kaytechnologie.online;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sgt.kaytechnologie.online;

    root /var/www/erp-sgt/public;
    index index.php;

    # SSL — géré par Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/sgt.kaytechnologie.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgt.kaytechnologie.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Upload photos terrain (max 6Mo)
    client_max_body_size 6M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Cache assets statiques
    location ~* \.(css|js|png|jpg|jpeg|webp|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/sgt.kaytechnologie.online.access.log;
    error_log  /var/log/nginx/sgt.kaytechnologie.online.error.log;
}
